services:
  postgres:
    image: postgres:16-alpine
    container_name: bestsupport-postgres-new
    restart: unless-stopped
    env_file:
      - ./helpdesk/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_new_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: bestsupport-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: bestsupport-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ./helpdesk/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  minio-init:
    image: minio/mc:latest
    container_name: bestsupport-minio-init
    depends_on:
      - minio
    env_file:
      - ./helpdesk/.env
    entrypoint: >
      /bin/sh -c "
      BUCKET=$${MINIO_BUCKET:-bestsupport-media} &&
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...' && sleep 2;
      done &&
      mc mb -p \"local/$$BUCKET\" || true &&
      mc anonymous set none \"local/$$BUCKET\" || true
      "
    restart: "no"
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bestsupport-app
    restart: unless-stopped
    env_file:
      - ./helpdesk/.env
    environment:
      DJANGO_DEBUG: "False"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      USE_REDIS_CHANNEL_LAYER: "True"
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    networks:
      - backend

  coturn:
    build:
      context: ./docker/coturn
      dockerfile: Dockerfile
    image: bestsupport-coturn:latest
    container_name: bestsupport-coturn
    restart: unless-stopped
    env_file:
      - ./helpdesk/.env
    volumes:
      - ./docker/nginx/certs:/certs:ro
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: bestsupport-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    networks:
      - backend

volumes:
  postgres_new_data:
  redis_data:
  static_data:
  media_data:
  minio_data:

networks:
  backend:
