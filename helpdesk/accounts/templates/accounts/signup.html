{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Register</h2>
        <p class="text-muted">Enter your company email address to receive a registration link.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Send registration link</button>
        </form>
    </div>
</div>
{% endblock %}
