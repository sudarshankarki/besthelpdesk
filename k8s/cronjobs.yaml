apiVersion: batch/v1
kind: CronJob
metadata:
  name: bestsupport-prune-ticket-messages
spec:
  schedule: "45 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/component: prune-ticket-messages
        spec:
          restartPolicy: OnFailure
          containers:
            - name: prune-ticket-messages
              image: bestsupport-app:latest
              imagePullPolicy: IfNotPresent
              command:
                - /app/entrypoint.sh
              args:
                - python
                - manage.py
                - prune_ticket_messages
              envFrom:
                - configMapRef:
                    name: bestsupport-config
                - secretRef:
                    name: bestsupport-secrets
              env:
                - name: RUN_MIGRATIONS
                  value: "false"
                - name: RUN_COLLECTSTATIC
                  value: "false"
                - name: START_SERVER
                  value: "false"
                - name: WAIT_FOR_DB
                  value: "true"
---
