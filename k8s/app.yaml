apiVersion: apps/v1
kind: Deployment
metadata:
  name: bestsupport-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: app
          image: bestsupport-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - /app/entrypoint.sh
          envFrom:
            - configMapRef:
                name: bestsupport-config
            - secretRef:
                name: bestsupport-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "false"
            - name: RUN_COLLECTSTATIC
              value: "true"
            - name: START_SERVER
              value: "true"
            - name: WAIT_FOR_DB
              value: "true"
          ports:
            - containerPort: 8000
              name: django
          volumeMounts:
            - name: staticfiles
              mountPath: /app/staticfiles
            - name: media
              mountPath: /app/media
          startupProbe:
            httpGet:
              path: /healthz/
              port: django
              httpHeaders:
                - name: Host
                  value: localhost
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz/
              port: django
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz/
              port: django
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: staticfiles
              mountPath: /var/www/static
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz/
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /nginx-healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: staticfiles
          emptyDir: {}
        - name: media
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: bestsupport-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: bestsupport-web
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/component: web
