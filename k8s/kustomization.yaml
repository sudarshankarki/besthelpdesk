apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bestsupport
resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - minio.yaml
  - minio-init-job.yaml
  - nginx-configmap.yaml
  - migrate-job.yaml
  - app.yaml
  - ingress.yaml
  - cronjobs.yaml
images:
  - name: bestsupport-app
    newName: ghcr.io/your-org/bestsupport
    newTag: latest
