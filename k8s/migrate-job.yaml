apiVersion: batch/v1
kind: Job
metadata:
  name: bestsupport-migrate
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: bestsupport-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - /app/entrypoint.sh
          args:
            - python
            - manage.py
            - migrate
            - --noinput
          envFrom:
            - configMapRef:
                name: bestsupport-config
            - secretRef:
                name: bestsupport-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "false"
            - name: RUN_COLLECTSTATIC
              value: "false"
            - name: START_SERVER
              value: "false"
            - name: WAIT_FOR_DB
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
